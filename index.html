<script>
// ── JSON IMPORT ───────────────────────────────
async function importJSON() {
  const raw = document.getElementById('json-import').value.trim();
  const result = document.getElementById('import-result');
  if (!raw) { result.textContent = '⚠️ JSON을 붙여넣어 주세요'; return; }

  let items;
  try {
    items = JSON.parse(raw);
    if (!Array.isArray(items)) throw new Error('배열 형식이어야 합니다');
  } catch(e) {
    result.textContent = '❌ JSON 형식 오류: ' + e.message;
    result.style.color = 'var(--red)';
    return;
  }

  // Build unit name → id map for current language
  const unitMap = {};
  Object.values(DB.units)
    .filter(u => u.language === S.teacherLang)
    .forEach(u => { unitMap[u.name] = u.id; });

  let added = 0, skipped = 0;
  for (const item of items) {
    const text = (item.text || '').trim();
    if (!text) { skipped++; continue; }

    const type    = item.type === 'vocabulary' ? 'vocabulary' : 'sentence';
    const pinyin  = (item.pinyin  || '').trim();
    const meaning = (item.meaning || '').trim();
    const lang    = S.teacherLang;

    // Determine words
    const pinyinOnly = !text && !!pinyin && lang === 'zh';
    let words;
    if (item.words && Array.isArray(item.words)) {
      words = item.words;
    } else if (pinyinOnly) {
      words = pinyin.split(/\s+/).filter(Boolean);
    } else if (lang === 'zh') {
      words = [...text].filter(c => c.trim());
    } else {
      words = text.split(/\s+/).filter(Boolean);
    }

    // Match unitName to unitId
    let unitId = null;
    if (item.unitName) {
      // Try exact match first, then partial match
      if (unitMap[item.unitName]) {
        unitId = unitMap[item.unitName];
      } else {
        const match = Object.entries(unitMap).find(([k]) => k.includes(item.unitName) || item.unitName.includes(k));
        if (match) unitId = match[1];
      }
    }
    // Also support unitId directly
    if (!unitId && item.unitId && DB.units[item.unitId]) unitId = item.unitId;

    const id = genId();
    DB.content[id] = { id, language:lang, type, text, pinyin, meaning, words, audioData:null, pinyinOnly:false, unitId };
    added++;
  }

  await saveContent();
  result.textContent = `✅ ${added}개 추가 완료${skipped ? ` (${skipped}개 건너뜀)` : ''}`;
  result.style.color = 'var(--green)';
  document.getElementById('json-import').value = '';
  setTimeout(() => render(), 800);
}

// ── STORAGE ──────────────────────────────────
// ── FIREBASE INIT ─────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDOpE7rM1A31A569ZcZmcsVOIecUc--aUI",
  authDomain: "hyomyung-langlab.firebaseapp.com",
  projectId: "hyomyung-langlab",
  storageBucket: "hyomyung-langlab.firebasestorage.app",
  messagingSenderId: "100254086070",
  appId: "1:100254086070:web:b957aa93d10bb13af9c717"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const Store = {
  async get(k) {
    try {
      const snap = await db.collection('langlab').doc(k).get();
      return snap.exists ? JSON.parse(snap.data().value) : null;
    } catch(e) { console.error('FB get error:', e); return null; }
  },
  async set(k, v) {
    try {
      await db.collection('langlab').doc(k).set({ value: JSON.stringify(v) });
    } catch(e) { console.error('FB set error:', e); }
  }
};

// ── TTS ──────────────────────────────────────
const LANG_CODE = { zh:'zh-CN', ja:'ja-JP', en:'en-US' };
function speak(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = LANG_CODE[lang] || 'ko-KR';
  u.rate = 0.88;
  window.speechSynthesis.speak(u);
}

// ── EXCEL ─────────────────────────────────────
function parseExcelUpload(file, classId) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1 });
      let added = 0;
      rows.forEach((row, ri) => {
        // Skip fully empty rows
        if (!row[0] && !row[1] && !row[2]) return;
        // Skip header row: if first cell is text like "학년/반", "번호", "이름", "name" etc.
        const first = (row[0]||'').toString().trim();
        if (ri === 0 && isNaN(parseInt(first)) && !/^\d/.test(first)) return;

        let number = '', name = '';
        const hasC = row[2] !== undefined && row[2] !== null && row[2].toString().trim() !== '';
        const hasB = row[1] !== undefined && row[1] !== null && row[1].toString().trim() !== '';

        let classGroup = '';
        if (hasC) {
          // 3-column format: A=학년/반, B=번호, C=이름
          classGroup = row[0].toString().trim();
          number = parseInt(row[1]) || '';
          name   = row[2].toString().trim();
        } else if (hasB) {
          // 2-column format: A=번호, B=이름
          number = parseInt(row[0]) || '';
          name   = row[1].toString().trim();
        } else {
          // 1-column format: A=이름 only
          name = first;
        }

        if (name) {
          DB.classes[classId].students.push({ id:genId(), classGroup, number, name });
          added++;
        }
      });
      saveClasses().then(() => { toast(`${added}명 추가됨`, 'ok'); render(); });
    } catch { toast('파일 파싱 오류', 'err'); }
  };
  r.readAsBinaryString(file);
}

function addContent() {
  const lang  = S.teacherLang;
  const type  = document.getElementById('ct').value;
  const text  = document.getElementById('ctxt').value.trim();
  const py    = document.getElementById('cpy').value.trim();
  const mean  = document.getElementById('cmean').value.trim();
  const wraw  = document.getElementById('cwds').value.trim();
  const aFile = document.getElementById('caud').files[0];

  // Allow pinyin-only: if text is empty but pinyin is provided, use pinyin as text
  const pinyinOnly = !text && !!py && lang === 'zh';
  const effectiveText = text || py;
  if (!effectiveText) return toast('텍스트 또는 병음을 입력하세요', 'err');

  let words;
  if (wraw) {
    words = wraw.split(/\s+/).filter(Boolean);
  } else if (pinyinOnly) {
    // Pinyin-only: split by spaces (syllable by syllable)
    words = py.split(/\s+/).filter(Boolean);
  } else if (lang === 'zh') {
    words = [...effectiveText].filter(c => c.trim());
  } else {
    words = effectiveText.split(/\s+/).filter(Boolean);
  }

  const unitEl = document.getElementById('cunit');
  const unitId = unitEl ? unitEl.value : '';
  function save(audioData=null) {
    const id = genId();
    DB.content[id] = { id, language:lang, type, text:effectiveText, pinyin: pinyinOnly ? '' : py, meaning:mean, words, audioData, pinyinOnly, unitId: unitId||null };
    saveContent().then(()=>{ toast('콘텐츠 추가!', 'ok'); render(); });
  }
  if (aFile) {
    const fr = new FileReader();
    fr.onload = e => save(e.target.result);
    fr.readAsDataURL(aFile);
  } else { save(); }
}

function delContent(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  delete DB.content[id];
  saveContent().then(()=>{ toast('삭제됨'); render(); });
}

// Teacher → Records
function renderRecords() {
  const classes = Object.values(DB.classes).filter(c => c.language === S.teacherLang);
  const units   = Object.values(DB.units)
    .filter(u => u.language === S.teacherLang)
    .sort((a,b) => (a.order||0)-(b.order||0));

  if (!classes.length) return `<div class="empty"><div class="ico">📊</div><p>반을 먼저 생성하세요.</p></div>`;

  // Unit filter tabs
  const filterUnits = [{id:'__all__', label:'전체'}, ...units.map(u=>({id:u.id, label:(u.order?u.order+'단원 ':'')+u.name}))];
  const selectedUnit = S.recordUnitFilter || '__all__';

  const filterHtml = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;align-items:center">
      <span style="font-size:.78rem;font-weight:700;color:var(--gray);margin-right:4px">단원 필터:</span>
      ${filterUnits.map(u=>`
        <button class="filter-btn ${selectedUnit===u.id?'active':''}"
          onclick="S.recordUnitFilter='${u.id}';render()">
          ${u.label}
        </button>`).join('')}
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="confirmResetRecords()">
        🗑️ 기록 초기화
      </button>
    </div>`;

  const classCards = classes.map(cls => {
    if (!cls.students.length) return `
      <div class="form-card"><h3>🏫 ${cls.name}</h3>
        <p style="color:var(--gray);font-size:.83rem">학생이 없습니다.</p>
      </div>`;

    const rows = [...cls.students].sort((a,b)=>(a.number||9999)-(b.number||9999)).map(st => {
      // Filter records by selected unit
      const recs = Object.entries(DB.records)
        .filter(([k]) => {
          if (!k.startsWith(cls.id+'_'+st.id+'_')) return false;
          if (selectedUnit === '__all__') return true;
          // key format: classId_studentId_contentId_type
          // find content and check unitId
          const parts = k.split('_');
          const contentId = parts[2];
          const c = DB.content[contentId];
          return c && c.unitId === selectedUnit;
        })
        .map(([,v])=>v);
      const total   = recs.reduce((a,r)=>a+r.attempts,0);
      const correct = recs.reduce((a,r)=>a+r.correct,0);
      const pct     = total>0 ? Math.round(correct/total*100) : null;
      return { classGroup:st.classGroup, number:st.number, name:st.name, stId:st.id, total, correct, pct };
    });

    // Unit label for header
    const unitLabel = selectedUnit === '__all__' ? '전체' :
      (DB.units[selectedUnit] ? (DB.units[selectedUnit].order ? DB.units[selectedUnit].order+'단원 ' : '') + DB.units[selectedUnit].name : '');

    return `
      <div class="form-card">
        <h3>
          <span>🏫 ${cls.name} <span style="font-weight:400;color:var(--gray);font-size:.82rem">${unitLabel} 기록</span></span>
          <button class="btn btn-danger btn-xs" onclick="confirmResetClass('${cls.id}','${cls.name}')">반 기록 초기화</button>
        </h3>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--bg)">
            <th style="padding:8px;text-align:left;font-size:.75rem;color:var(--gray)">학생</th>
            <th style="padding:8px;text-align:center;font-size:.75rem;color:var(--gray)">시도</th>
            <th style="padding:8px;text-align:center;font-size:.75rem;color:var(--gray)">정답</th>
            <th style="padding:8px;text-align:center;font-size:.75rem;color:var(--gray)">정답률</th>
            <th style="padding:8px;text-align:center;font-size:.75rem;color:var(--gray)">초기화</th>
          </tr></thead>
          <tbody>
          ${rows.map(r=>`
            <tr>
              <td style="padding:9px 8px;border-top:1px solid var(--bg)">
                ${r.classGroup ? `<span style="font-size:.7rem;font-weight:700;background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:4px;margin-right:4px">${r.classGroup}</span>` : ""}
                ${r.number ? `<span style="color:var(--amber);font-weight:700;font-size:.8rem;margin-right:4px">${r.number}번</span>` : ""}
                👤 ${r.name}
              </td>
              <td style="padding:9px 8px;border-top:1px solid var(--bg);text-align:center">${r.total||'—'}</td>
              <td style="padding:9px 8px;border-top:1px solid var(--bg);text-align:center">${r.correct||'—'}</td>
              <td style="padding:9px 8px;border-top:1px solid var(--bg);text-align:center">
                ${r.pct!==null
                  ? `<span style="font-weight:700;color:${r.pct>=70?'var(--green)':'var(--red)'}">${r.pct}%</span>`
                  : '—'}
              </td>
              <td style="padding:9px 8px;border-top:1px solid var(--bg);text-align:center">
                ${r.total ? `<button class="btn btn-danger btn-xs" onclick="confirmResetStudent('${cls.id}','${r.stId}','${r.name}')">초기화</button>` : '—'}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }).join('');

  return filterHtml + classCards;
}

// Reset helpers
function confirmResetRecords() {
  if (!confirm('이 언어의 전체 학습 기록을 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  const lang = S.teacherLang;
  // Delete all records for classes in this language
  const classIds = Object.values(DB.classes)
    .filter(c => c.language === lang)
    .map(c => c.id);
  Object.keys(DB.records).forEach(k => {
    if (classIds.some(cid => k.startsWith(cid + '_'))) delete DB.records[k];
  });
  saveRecords().then(() => { toast('전체 기록이 초기화되었습니다', 'ok'); render(); });
}

function confirmResetClass(clsId, clsName) {
  if (!confirm(`[${clsName}] 반의 모든 학습 기록을 초기화하시겠습니까?`)) return;
  Object.keys(DB.records).forEach(k => {
    if (k.startsWith(clsId + '_')) delete DB.records[k];
  });
  saveRecords().then(() => { toast(`${clsName} 기록 초기화 완료`, 'ok'); render(); });
}

function confirmResetStudent(clsId, stId, name) {
  if (!confirm(`[${name}] 학생의 학습 기록을 초기화하시겠습니까?`)) return;
  Object.keys(DB.records).forEach(k => {
    if (k.startsWith(clsId + '_' + stId + '_')) delete DB.records[k];
  });
  saveRecords().then(() => { toast(`${name} 기록 초기화 완료`, 'ok'); render(); });
}

      <span>${cls.name}</span>
    </div>
    <div class="section-title">👤 이름을 클릭하세요</div>
    <div class="btn-grid">
      ${sorted.map(s=>`
        <div class="btn-card" onclick="_selStudent('${s.id}')">
          ${s.classGroup ? `<div style="font-size:.68rem;font-weight:700;color:#3730a3;background:#e0e7ff;border-radius:5px;padding:1px 7px;display:inline-block;margin-bottom:3px">${s.classGroup}</div>` : ''}
          ${s.number ? `<div style="font-size:.72rem;font-weight:700;color:var(--amber)">${s.number}번</div>` : ''}
          <div style="font-size:1.3rem">😊</div>
          <div style="font-weight:700;margin-top:3px">${s.name}</div>
        </div>`).join('')}
    </div>
  </div>`;
}
window._selStudent = (id) => nav('student',{studentStep:'exercise',studentId:id});

function renderExSel() {
  const cls = DB.classes[S.classId];
  const st  = cls.students.find(s=>s.id===S.studentId);
  const langLabel = {zh:'🇨🇳 중국어',ja:'🇯🇵 일본어',en:'🇺🇸 영어'}[S.language];
  return `<div class="screen">
    <div class="breadcrumb">
      <span class="link" onclick="nav('student',{studentStep:'lang'})">언어 선택</span> ›
      <span class="link" onclick="nav('student',{studentStep:'unit'})">단원 선택</span> ›
      <span class="link" onclick="nav('student',{studentStep:'class'})">반 선택</span> ›
      <span class="link" onclick="nav('student',{studentStep:'student'})">${cls.name}</span> ›
      <span>${st.name}</span>
    </div>
    <div class="section-title" style="margin-bottom:18px">✏️ 학습 유형을 선택하세요 <span style="font-weight:400;font-size:.85rem;color:var(--gray)">(${langLabel})</span></div>
    ${true ? `
      <div class="section-title">✏️ 학습 유형 선택</div>
      <div class="ex-grid">
        ${[
          {t:'word',    i:'🔤', n:'단어 배열',      d:'단어를 올바른 순서로 배열'},
          {t:'blank',   i:'📝', n:'빈칸 채우기',    d:'빈칸에 알맞은 단어 입력'},
          {t:'flash',   i:'🃏', n:'플래시카드',      d:'단어 뜻 맞추기'},
          {t:'meaning', i:'🎯', n:'뜻 보고 찾기',   d:'한국어 뜻을 보고 문장 고르기'}
        ].map(ex=>`
          <div class="ex-card" onclick="_startEx('${ex.t}')">
            <div class="icon">${ex.i}</div>
            <div class="name">${ex.n}</div>
            <div class="desc">${ex.d}</div>
          </div>`).join('')}
      </div>` : `<p style="color:var(--gray);text-align:center">언어를 먼저 선택하세요.</p>`}
  </div>`;
}
// _selLang removed - language selected at start of student flow

window._startEx = (type) => {
  const allItems = Object.values(DB.content).filter(c => c.language === S.language);
  const items = S.unitId && S.unitId !== '__all__'
    ? allItems.filter(c => c.unitId === S.unitId)
    : allItems;
  if (!items.length) return toast('이 단원에 콘텐츠가 없습니다. 교사에게 문의하세요.', 'err');
  S.exType    = type;
  S.exItems   = items.sort(()=>Math.random()-.5);
  S.exIdx     = 0;
  S.exScore   = 0;
  initEx();
  nav('student', {studentStep:'practice'});
};

function initEx() {
  const item = S.exItems[S.exIdx];
  if (!item) return;
  S.exAnswered = false;
  S.meaningChoices = null;
  S.meaningWrongPick = null;
  if (S.exType==='word') {
    S.waBank   = [...item.words].sort(()=>Math.random()-.5);
    S.waAnswer = [];
  } else if (S.exType==='blank') {
    S.fbWords    = item.words || (item.language==='zh' ? [...item.text] : item.text.split(' '));
    S.fbBlankIdx = Math.floor(Math.random() * S.fbWords.length);
    S.fbUserAnswer = '';
  } else {
    S.fcFlipped = false;
  }
}

// ── PRACTICE ──────────────────────────────────
function renderPractice() {
  const item = S.exItems[S.exIdx];
  if (!item) return renderDone();
  const cls   = DB.classes[S.classId];
  const st    = cls.students.find(s=>s.id===S.studentId);
  const total = S.exItems.length;
  const pct   = ((S.exIdx)/total*100).toFixed(0);
  const typeLabel = {word:'단어 배열',blank:'빈칸 채우기',flash:'플래시카드',meaning:'뜻 보고 찾기'}[S.exType];
  const doneUnit = S.unitId && S.unitId !== '__all__' && DB.units[S.unitId]
    ? (DB.units[S.unitId].order ? DB.units[S.unitId].order+'단원 ' : '') + DB.units[S.unitId].name
    : '전체';
  const unitName = S.unitId && S.unitId !== '__all__' && DB.units[S.unitId]
    ? (DB.units[S.unitId].order ? DB.units[S.unitId].order+'단원 ' : '') + DB.units[S.unitId].name
    : '전체';
  const langLabel = {zh:'🇨🇳',ja:'🇯🇵',en:'🇺🇸'}[S.language];

  let exBody = '';
  if (S.exType==='word')    exBody = renderWordArrangement(item);
  if (S.exType==='blank')   exBody = renderFillBlank(item);
  if (S.exType==='flash')   exBody = renderFlashcard(item);
  if (S.exType==='meaning') exBody = renderMeaningEx(item);

  return `<div class="screen">
    <div class="breadcrumb">
      <span class="link" onclick="nav('student',{studentStep:'exercise'})">${langLabel} · ${unitName} · ${typeLabel}</span> ›
      <span>${st.name}</span>
    </div>
    <div class="ex-area">
      <div class="ex-progress">
        <span>📍 ${S.exIdx+1} / ${total}</span>
        <span>🏆 ${S.exScore}점</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${exBody}
    </div>
  </div>`;
}

// Word Arrangement
function renderWordArrangement(item) {
  return `
    <div class="ex-top">
      <span style="font-size:.83rem;color:var(--gray)">단어를 클릭해 문장을 완성하세요</span>
      <button class="audio-btn" onclick="_playItemById('${item.id}')">🔊</button>
    </div>
    ${item.pinyinOnly ? `<div style="font-size:.72rem;background:#fef9c3;color:#854d0e;padding:3px 10px;border-radius:6px;text-align:center;margin-bottom:8px;font-weight:600">병음 전용 학습</div>` : ''}
    ${item.pinyin && !item.pinyinOnly ? `<div class="pinyin-line">${item.pinyin}</div>` : ''}
    ${item.meaning ? `<div class="meaning-line">뜻: ${item.meaning}</div>` : ''}

    <div class="label-small">▶ 답변 영역</div>
    <div class="answer-area ${S.waAnswer.length?'active':''}">
      ${S.waAnswer.map((w,i)=>`<button class="word-chip placed" onclick="_rmWord(${i})">${w}</button>`).join('')}
      ${!S.waAnswer.length ? `<span class="placeholder-text">단어를 여기에 배열하세요</span>` : ''}
    </div>

    <div class="label-small">📦 단어 목록</div>
    <div class="word-bank">
      ${S.waBank.map((w,i)=>`<button class="word-chip" onclick="_addWord(${i})">${w}</button>`).join('')}
    </div>

    <div class="ex-actions">
      <button class="btn btn-outline" onclick="_resetWA()">초기화</button>
      <button class="btn btn-primary" onclick="_submitWA()">제출 →</button>
    </div>
    <div id="res" class="result-area"></div>`;
}

window._addWord = (i) => {
  if (S.exAnswered) return;
  S.waAnswer.push(S.waBank.splice(i,1)[0]);
  render();
};
window._rmWord = (i) => {
  if (S.exAnswered) return;
  S.waBank.push(S.waAnswer.splice(i,1)[0]);
  render();
};
window._resetWA = () => {
  const item = S.exItems[S.exIdx];
  S.waBank   = [...item.words].sort(()=>Math.random()-.5);
  S.waAnswer = [];
  S.exAnswered = false;
  render();
};
window._submitWA = () => {
  if (!S.waAnswer.length) return toast('단어를 배열해주세요', 'err');
  const item   = S.exItems[S.exIdx];
  const got    = S.waAnswer.join('');
  const expect = item.words.join('');
  const correct = got===expect || S.waAnswer.join(' ')===item.words.join(' ');
  S.exAnswered = true;
  if (correct) S.exScore++;
  recordResult(correct);
  const res = document.getElementById('res');
  if (res) res.innerHTML = correct
    ? `<div class="result-correct">✅ 정답!</div>
       <button class="btn btn-primary" style="margin-top:8px" onclick="_next()">다음 →</button>`
    : `<div class="result-wrong">❌ 오답</div>
       <div class="result-hint">정답: <strong>${item.words.join(' ')}</strong></div>
       <button class="btn btn-primary" style="margin-top:8px" onclick="_next()">다음 →</button>`;
};

// Fill in Blank
function renderFillBlank(item) {
  const words = S.fbWords;
  const bi    = S.fbBlankIdx;
  const sentence = words.map((w,i) =>
    i===bi
      ? `<input class="blank-input" id="fb-in" type="text" value="${S.fbUserAnswer}" 
           placeholder="?" oninput="S.fbUserAnswer=this.value"
           onkeydown="if(event.key==='Enter')_submitBlank()">`
      : `<span style="margin:0 3px">${w}</span>`
  ).join('');

  return `
    <div class="ex-top">
      <span style="font-size:.83rem;color:var(--gray)">빈칸에 알맞은 단어를 입력하세요</span>
      <button class="audio-btn" onclick="_playItemById('${item.id}')">🔊</button>
    </div>
    ${item.pinyinOnly ? `<div style="font-size:.72rem;background:#fef9c3;color:#854d0e;padding:3px 10px;border-radius:6px;text-align:center;margin-bottom:8px;font-weight:600">병음 전용 학습</div>` : ''}
    ${item.pinyin && !item.pinyinOnly ? `<div class="pinyin-line">${item.pinyin}</div>` : ''}
    <div class="blank-sentence">${sentence}</div>
    ${item.meaning ? `<div class="meaning-line" style="margin-top:8px">뜻: ${item.meaning}</div>` : ''}
    <div class="ex-actions" style="margin-top:18px">
      <button class="btn btn-primary" onclick="_submitBlank()">제출 →</button>
    </div>
    <div id="res" class="result-area"></div>`;
}

// Normalize tone marks for pinyin comparison
function normPinyin(s) {
  return s.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e')
    .replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o')
    .replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'v')
    .replace(/\s/g,'');
}

window._submitBlank = () => {
  const input  = document.getElementById('fb-in');
  const answer = (input ? input.value : S.fbUserAnswer).trim();
  const item   = S.exItems[S.exIdx];
  const correct_word = S.fbWords[S.fbBlankIdx];
  let correct = answer.toLowerCase() === correct_word.toLowerCase();

  // Chinese: also accept pinyin
  if (!correct && item.language==='zh' && item.pinyin) {
    const pyParts = item.pinyin.split(/\s+/);
    const expected = pyParts[S.fbBlankIdx];
    if (expected) {
      correct = normPinyin(answer) === normPinyin(expected)
             || answer.toLowerCase() === expected.toLowerCase();
    }
  }

  S.exAnswered = true;
  if (correct) S.exScore++;
  recordResult(correct);

  const pyHint = !item.pinyinOnly && item.language==='zh' && item.pinyin
    ? ` (${item.pinyin.split(/\s+/)[S.fbBlankIdx]||''})`
    : '';

  const res = document.getElementById('res');
  if (res) res.innerHTML = correct
    ? `<div class="result-correct">✅ 정답!</div>
       <button class="btn btn-primary" style="margin-top:8px" onclick="_next()">다음 →</button>`
    : `<div class="result-wrong">❌ 오답</div>
       <div class="result-hint">정답: <strong>${correct_word}</strong>${pyHint}</div>
       <button class="btn btn-primary" style="margin-top:8px" onclick="_next()">다음 →</button>`;
};

// Flashcard
function renderFlashcard(item) {
  return `
    <div class="ex-top">
      <span style="font-size:.83rem;color:var(--gray)">카드를 클릭하면 뒤집힙니다</span>
      <button class="audio-btn" onclick="_playItemById('${item.id}')">🔊</button>
    </div>
    <div class="fc-wrapper">
      <div class="fc ${S.fcFlipped?'flipped':''}" id="fc" onclick="_flipCard()">
        <div class="fc-face fc-front">
          ${item.pinyinOnly ? `<div style="font-size:.72rem;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:6px;margin-bottom:10px">병음 전용</div>` : (item.pinyin ? `<div style="font-size:.88rem;opacity:.7;margin-bottom:8px">${item.pinyin}</div>` : '')}
          <div style="font-size:2rem;font-weight:700">${item.text}</div>
          <div class="fc-hint">👆 클릭하여 뒤집기</div>
        </div>
        <div class="fc-face fc-back">
          <div style="font-size:.9rem;opacity:.8;margin-bottom:8px">한국어 뜻</div>
          <div style="font-size:1.6rem;font-weight:700">${item.meaning||'(뜻 없음)'}</div>
        </div>
      </div>
    </div>
    <div class="fc-btns ${S.fcFlipped?'show':''}" id="fc-btns">
      <button class="btn btn-danger" onclick="_submitFC(false)">❌ 몰랐어요</button>
      <button class="btn btn-green"  onclick="_submitFC(true)">✅ 알았어요</button>
    </div>`;
}

window._flipCard = () => {
  if (S.fcFlipped) return;
  S.fcFlipped = true;
  const fc = document.getElementById('fc');
  if (fc) fc.classList.add('flipped');
  setTimeout(() => {
    const btns = document.getElementById('fc-btns');
    if (btns) btns.classList.add('show');
  }, 460);
};

window._submitFC = (correct) => {
  if (correct) S.exScore++;
  recordResult(correct);
  _next();
};

// Meaning Exercise (뜻 보고 문장 찾기)
function renderMeaningEx(item) {
  // Build choices: correct + up to 3 random wrong from same language
  if (!S.meaningChoices) buildMeaningChoices(item);
  const choices = S.meaningChoices;

  const numsLabel = ['①','②','③','④'];
  const choiceHtml = choices.map((c, i) => {
    let cls = '';
    if (S.exAnswered) {
      if (c.id === item.id) cls = 'correct';
      else if (c.id === S.meaningWrongPick) cls = 'wrong';
    }
    return `<button class="meaning-choice ${cls}" 
      ${S.exAnswered ? 'disabled' : ''}
      onclick="_pickMeaning('${c.id}')">
      <span class="choice-num">${numsLabel[i]}</span>
      <span>${c.text}${c.pinyin ? ` <span style="font-size:.82rem;color:var(--zh);margin-left:6px">(${c.pinyin})</span>` : ''}</span>
    </button>`;
  }).join('');

  return `
    <div class="ex-top">
      <span style="font-size:.83rem;color:var(--gray)">뜻을 보고 맞는 문장을 고르세요</span>
      ${S.exAnswered ? `<button class="audio-btn" onclick="_playItemById('${item.id}')">🔊</button>` : ''}
    </div>
    
    <div style="background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;border-radius:14px;padding:24px;text-align:center;margin:12px 0 4px">
      <div style="font-size:.78rem;opacity:.6;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">한국어 뜻</div>
      <div style="font-size:1.5rem;font-weight:700">${item.meaning || '(뜻 없음)'}</div>
    </div>

    <div class="meaning-choices">${choiceHtml}</div>

    ${S.exAnswered ? `
      <div class="result-area" style="margin-top:16px">
        ${S.meaningWrongPick === null
          ? '<div class="result-correct">✅ 정답!</div>'
          : `<div class="result-wrong">❌ 오답</div>
             <div class="result-hint">정답: <strong>${item.text}</strong></div>`}
        <button class="btn btn-primary" style="margin-top:10px" onclick="_next()">다음 →</button>
      </div>` : ''}`;
}

function buildMeaningChoices(item) {
  // Get all other items in same language as wrong options
  const pool = Object.values(DB.content)
    .filter(c => c.language === item.language && c.id !== item.id && c.meaning);
  // Shuffle pool and take up to 3
  const wrong = pool.sort(() => Math.random() - .5).slice(0, 3);
  // Combine with correct and shuffle
  S.meaningChoices = [item, ...wrong].sort(() => Math.random() - .5);
  S.meaningWrongPick = null;
}

window._pickMeaning = (chosenId) => {
  if (S.exAnswered) return;
  const item = S.exItems[S.exIdx];
  const correct = chosenId === item.id;
  S.exAnswered = true;
  if (correct) {
    S.exScore++;
    S.meaningWrongPick = null;
  } else {
    S.meaningWrongPick = chosenId;
  }
  recordResult(correct);
  render();
};

// ── DONE ─────────────────────────────────────
function renderDone() {
  const total = S.exItems.length;
  const pct   = Math.round(S.exScore/total*100);
  const cls   = DB.classes[S.classId];
  const st    = cls.students.find(s=>s.id===S.studentId);
  const emoji = pct>=80?'🏆':pct>=60?'👍':'💪';
  const color = pct>=70?'var(--green)':'var(--red)';

  return `<div class="screen">
    <div class="done-card">
      <div style="font-size:3.5rem;margin-bottom:14px">${emoji}</div>
      <h2 style="font-size:1.3rem;color:var(--navy);margin-bottom:4px">${st.name}님, 수고하셨어요!</h2>
      <p style="color:var(--gray);font-size:.85rem;margin-bottom:24px">${{word:'단어 배열',blank:'빈칸 채우기',flash:'플래시카드'}[S.exType]} 완료</p>
      <div class="done-pct" style="color:${color}">${pct}%</div>
      <p style="color:var(--gray);margin:8px 0 18px;font-size:.88rem">${total}문제 중 ${S.exScore}개 정답</p>
      <div class="progress-bar" style="margin-bottom:24px">
        <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-primary" onclick="window._startEx(S.exType)">🔄 다시 학습</button>
        <button class="btn btn-outline" onclick="nav('student',{studentStep:'exercise'})">← 유형 선택</button>
      </div>
    </div>
  </div>`;
}

window._next = () => {
  S.exIdx++;
  if (S.exIdx >= S.exItems.length) {
    render();
  } else {
    initEx();
    render();
  }
};

// ── RECORDS ──────────────────────────────────
function recordResult(correct) {
  const item = S.exItems[S.exIdx];
  const key  = `${S.classId}_${S.studentId}_${item.id}_${S.exType}`;
  if (!DB.records[key]) DB.records[key] = { attempts:0, correct:0 };
  DB.records[key].attempts++;
  if (correct) DB.records[key].correct++;
  DB.records[key].timestamp = Date.now();
  saveRecords();
}

// ── AFTER RENDER ─────────────────────────────
function afterRender() {
  // Handle pinyin field visibility in teacher content form
  const langSel = document.getElementById('cl');
  if (langSel) {
    const row = document.getElementById('pinyinRow');
    const toggle = () => { if (row) row.style.display = langSel.value==='zh'?'block':'none'; };
    langSel.addEventListener('change', toggle);
    toggle();
  }
  // Auto-focus blank input
  const fb = document.getElementById('fb-in');
  if (fb) fb.focus();
}

// ── INIT ─────────────────────────────────────
loadDB().then(render);
</script>
